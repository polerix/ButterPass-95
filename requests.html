<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ButterPass 95 | Request Line</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: var(--desktop-teal); height: auto; overflow: auto; padding: 20px; }
        .mobile-container { max-width: 500px; margin: 0 auto; }
        .request-item { background: #ffffcc; padding: 10px; margin-bottom: 5px; border: 1px inset white; }
    </style>
</head>
<body>
    <div class="mobile-container">
        <div class="window">
            <div class="title-bar">
                <div class="title-bar-text">ButterPass Request Line</div>
            </div>
            <div class="window-body">
                <p>Add your song requests to the DJ's notepad:</p>
                <div class="sunken-panel" id="request-list" style="height: 200px; margin-bottom: 10px; padding: 5px;">
                    <!-- Requests will appear here -->
                </div>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <input type="text" id="new-request" placeholder="Enter song name..." style="width: 100%;">
                    <button class="btn-retro" id="send-request" style="width: 100%;">Send Request</button>
                </div>
            </div>
            <div class="status-bar">
                <p class="status-bar-field" id="status">Connecting...</p>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const binId = urlParams.get('bin');
        const listContainer = document.getElementById('request-list');
        const input = document.getElementById('new-request');
        const sendBtn = document.getElementById('send-request');
        const status = document.getElementById('status');

        if (!binId) {
            status.textContent = "Error: Invalid link";
        } else {
            status.textContent = "Connected to DJ";
            fetchRequests();
            setInterval(fetchRequests, 5000);
        }

        async function fetchRequests() {
            try {
                const response = await fetch(`https://api.npoint.io/${binId}`);
                const data = await response.json();
                renderRequests(data.requests || []);
            } catch (error) {
                console.error("Fetch failed");
            }
        }

        function renderRequests(requests) {
            listContainer.innerHTML = requests.map(r => `<div class="request-item">${r}</div>`).join('');
        }

        sendBtn.onclick = async () => {
            const val = input.value.trim();
            if (!val) return;

            status.textContent = "Sending...";
            try {
                const response = await fetch(`https://api.npoint.io/${binId}`);
                const data = await response.json();
                const requests = data.requests || [];
                requests.push(val);
                
                await fetch(`https://api.npoint.io/${binId}`, {
                    method: 'POST',
                    body: JSON.stringify({ requests }),
                    headers: { 'Content-Type': 'application/json' }
                });
                
                input.value = '';
                status.textContent = "Request Sent!";
                renderRequests(requests);
            } catch (error) {
                status.textContent = "Error sending";
            }
        };
    </script>
</body>
</html>
